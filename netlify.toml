[build]
  command = "pnpm build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.21.1"

# Strip trailing slashes — Vike prerender generates no-trailing-slash URLs
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# Catch-all: serve 404 page for unmatched routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404